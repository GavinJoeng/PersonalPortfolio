<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - My Portfolio</title>
    <link href="../css/output.css" rel="stylesheet">
</head>
<body class="container-special">
    <div class="login-section">
        <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
        <form id="loginForm" class="form-space">
            <div>
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" required class="form-input">
            </div>
            <div>
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" required class="form-input">
            </div>
            <button type="submit" class="btn-full-width">Log in</button>
        </form>
        <p id="errorMessage" class="error-message"></p>
        <div class="mt-4 text-center">
            <a href="index.html" class="text-sm text-link">Back to Home</a>
        </div>
        <div class="mt-4 text-center">
            <p class="text-sm text-gray-400">
                Don't have an account? 
                <a href="signup.html" class="text-link">Sign up</a>
            </p>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
